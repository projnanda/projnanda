<html lang="en">
<head>

  <!-- Load Poppins Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="assets/nanda-favicon.svg">


  <style>
    /* NANDA Black & Silver Theme */
    :root {
      --theme-color: #2c3e50;
      --text-color-base: #2c3e50;
      --text-color-secondary: #7f8c8d;

      /* NANDA Theme Colors */
      --nanda-black: #000000;
      --nanda-yellow: #d8dde5;
      --nanda-yellow-light: #f0f3f7;
      --nanda-yellow-dark: #a7adb8;
      --nanda-gray: #1a1a1a;
      --nanda-gray-light: #2a2a2a;
      --nanda-text-light: #f5f5f5;
    }

    /* Force Poppins Font */
    body, h1, h2, h3, h4, h5, h6, p, span, div, a {
      font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif !important;
    }

    body { overflow-x: hidden; }

    body,
    .app {
      background: #ffffff;
    }

    /* Premium rounded sidebar — desktop only */
    @media (min-width: 1025px) {
      .sidebar {
        top: 14px;
        bottom: 14px;
        left: 14px;
        width: 320px;
        border-right: none;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
        overflow: hidden;
        border: 1px solid rgba(203, 213, 225, 0.8);
      }

      .sidebar-nav {
        padding: 12px 16px 22px;
      }

      .content {
        left: 348px !important;
        background: #ffffff;
      }
    }


    .markdown-section {
      max-width: 1100px;
      padding: 24px 32px;
      background: #ffffff;
      color: #2c3e50;
      margin: 0 auto;
    }

    .markdown-section h1 {
      font-size: 2rem;
      font-weight: 300;
      margin: 0 0 1rem;
      color: var(--nanda-black);
    }

    .markdown-section h2 {
      font-size: 1.75rem;
      font-weight: 300;
      color: var(--nanda-black);
      border-bottom: 3px solid var(--nanda-yellow);
      padding-bottom: 10px;
      margin-top: 40px;
    }

    .markdown-section h3 {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--nanda-black);
      border-left: 4px solid var(--nanda-yellow);
      padding-left: 15px;
    }

    .markdown-section blockquote {
      border-left: 4px solid var(--nanda-yellow);
      background: rgba(217, 221, 229, 0.08);
      padding: 1rem;
      margin: 2rem 0;
      color: #2c3e50;
    }

    .markdown-section a {
      color: var(--nanda-black);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .markdown-section a:hover {
      color: var(--nanda-yellow-dark);
    }

    .markdown-section code {
      background: #f8f9fa;
      color: var(--nanda-black);
      border: 1px solid #f0f3f7;
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 0.875em;
    }

    .markdown-section pre code {
      background: #f8f8f8;
      color: #333;
      padding: 1rem;
      border-radius: 4px;
    }

    .markdown-section hr {
      border: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--nanda-yellow), transparent);
      margin: 40px 0;
    }

    .markdown-section table th {
      background: var(--nanda-black);
      color: var(--nanda-yellow);
      border: 1px solid var(--nanda-yellow);
    }

    .markdown-section table td {
      background: #ffffff;
      color: #2c3e50;
      border: 1px solid #f0f3f7;
    }

    /* Hide default GitHub corner */
    .github-corner { display: none !important; }

    .app-name-link {
      font-weight: 300;
    }

    .github-corner:hover .octo-arm {
      animation: octocat-wave 560ms ease-in-out;
    }

    @keyframes octocat-wave {
      0%, 20%, 60%, 100% {
        transform: rotate(0);
      }
      40%, 80% {
        transform: rotate(-25deg);
      }
    }

    @media (max-width: 500px) {
      .github-corner:hover .octo-arm {
        animation: none;
      }
      .github-corner .octo-arm {
        animation: octocat-wave 560ms ease-in-out;
      }
    }

    .sidebar-nav > ul > li {
      margin-bottom: 8px;
    }

    .sidebar-nav > ul > li > p {
      cursor: pointer;
      margin: 0;
      padding: 8px 12px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background-color 0.2s ease;
    }

    .sidebar-nav > ul > li > p:hover {
      background: var(--nanda-yellow-light);
    }

    .sidebar-nav > ul > li > p::after {
      content: '▸';
      font-size: 10px;
      color: var(--text-color-secondary);
      margin-left: 8px;
      transition: transform 0.2s ease;
    }

    .sidebar-nav > ul > li > ul {
      max-height: 0;
      overflow: hidden;
      padding-left: 12px;
      transition: max-height 0.25s ease;
    }

    .sidebar-nav > ul > li.sidebar-open > p::after {
      transform: rotate(90deg);
    }

    .sidebar-nav > ul > li.sidebar-open > ul {
      max-height: 800px;
    }

    /* Tablet & phone — only undo premium visual styles, don't touch layout */
    @media (max-width: 1024px) {
      .sidebar {
        border-radius: 0 !important;
        border: none !important;
        box-shadow: none !important;
      }

      .sidebar .app-name-link img {
        width: 140px !important;
        margin: 5px 0 16px 0 !important;
      }

      .markdown-section {
        padding: 20px 16px;
      }

      .markdown-section table {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        white-space: nowrap;
      }

      .markdown-section h1 {
        font-size: 1.5rem;
      }

      .markdown-section h2 {
        font-size: 1.3rem;
        margin-top: 24px;
      }

      .markdown-section h3 {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<img src="assets/Golden + Black Text Logo.svg" alt="NANDA" style="width: 180px; margin: 10px 0 30px 0;">',
      repo: '',
      homepage: 'home.md',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: false,
      auto2top: true,
      maxLevel: 4,
      subMaxLevel: 2,
      relativePath: false,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md'
      },
      search: false
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script>
    (function () {
      const expandedSections = new Set(['Research & Standards', 'Live Projects']);
      const storageKey = 'nanda-sidebar-state';

      function readState() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || '{}');
        } catch (error) {
          return {};
        }
      }

      function writeState(nextState) {
        localStorage.setItem(storageKey, JSON.stringify(nextState));
      }

      function applySidebarDisclosure() {
        const items = document.querySelectorAll('.sidebar-nav > ul > li');
        const storedState = readState();

        items.forEach((item) => {
          const heading = item.querySelector(':scope > p');
          const children = item.querySelector(':scope > ul');

          if (!heading || !children) {
            return;
          }

          const label = heading.textContent.trim();
          const shouldOpen = Object.prototype.hasOwnProperty.call(storedState, label)
            ? storedState[label]
            : expandedSections.has(label);

          item.classList.toggle('sidebar-open', Boolean(shouldOpen));

          if (heading.dataset.sidebarBound === 'true') {
            return;
          }

          heading.dataset.sidebarBound = 'true';
          heading.addEventListener('click', () => {
            const nextOpen = !item.classList.contains('sidebar-open');
            item.classList.toggle('sidebar-open', nextOpen);
            writeState({
              ...readState(),
              [label]: nextOpen
            });
          });
        });
      }

      window.$docsify.plugins = [].concat(window.$docsify.plugins || [], [function (hook) {
        hook.doneEach(function () {
          requestAnimationFrame(applySidebarDisclosure);
        });
      }]);

      document.addEventListener('DOMContentLoaded', function () {
        requestAnimationFrame(applySidebarDisclosure);
      });
    })();
  </script>
</body>
</html>
